name: Publish @dkothule/ai-context to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:     # manual trigger fallback

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit $GITHUB_SHA is not on origin/main. Publish only from main-merged tags." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install dependencies
        working-directory: packages/cli
        run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/cli
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ($TAG_VERSION) != package.json ($PKG_VERSION)." >&2
            exit 1
          fi

      - name: Assert version sync with template manifest
        working-directory: packages/cli
        run: node scripts/assert-version-sync.js

      - name: Verify package version > latest published
        working-directory: packages/cli
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npm view "$PKG_NAME" version 2>/dev/null || true)"
          if [ -z "$PUBLISHED" ]; then
            echo "No published version found for $PKG_NAME — first publish."
            exit 0
          fi
          echo "Published: $PUBLISHED    Candidate: $PKG_VERSION"
          node - "$PUBLISHED" "$PKG_VERSION" <<'NODE'
          const parse = v => {
            const m = v.match(/^([0-9]+)\.([0-9]+)\.([0-9]+)(?:-([0-9A-Za-z.-]+))?/);
            if (!m) throw new Error(`bad semver: ${v}`);
            return { major: +m[1], minor: +m[2], patch: +m[3], pre: m[4] || null };
          };
          const cmp = (a, b) =>
            a.major - b.major || a.minor - b.minor || a.patch - b.patch ||
            (a.pre === b.pre ? 0 : a.pre === null ? 1 : b.pre === null ? -1 :
              a.pre.localeCompare(b.pre, undefined, { numeric: true }));
          const [, , pub, cand] = process.argv;
          if (cmp(parse(cand), parse(pub)) <= 0) {
            console.error(`package.json (${cand}) must be > published (${pub}).`);
            process.exit(1);
          }
          NODE

      - name: Typecheck
        working-directory: packages/cli
        run: npm run typecheck

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Test
        working-directory: packages/cli
        run: npm test

      - name: Dry-run pack
        working-directory: packages/cli
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-publish       # require approval in this env for extra safety
    permissions:
      contents: read
      id-token: write              # OIDC trusted publishing — no NPM_TOKEN needed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'
          cache-dependency-path: packages/cli/package-lock.json

      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: packages/cli
        run: npm ci

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public --provenance
